<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Harley Co. | Coming Soon</title>
<meta name="description" content="The Harley Co. — Fresh Off The Route. Our site is coming soon.">
<link rel="icon" type="image/svg+xml" href="images/logo.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --teal: #3d9187;
    --cream: #f5efdc;
    --ink: #1a1a1a;
    --mustard: #e2a83c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
  }
  body {
    font-family: 'Jost', 'Segoe UI', Arial, sans-serif;
    background: var(--teal);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .wrap {
    max-width: 460px;
  }
  .badge {
    width: 150px;
    height: 150px;
    margin: 0 auto 28px;
  }
  h1 {
    font-family: 'Kaushan Script', 'Brush Script MT', cursive;
    font-size: clamp(2.2rem, 7vw, 3rem);
    margin: 0 0 16px;
  }
  p {
    font-size: 1.05rem;
    line-height: 1.6;
    color: rgba(245, 239, 220, 0.92);
    margin: 0 0 28px;
  }
  .pill {
    display: inline-block;
    background: var(--mustard);
    color: var(--ink);
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 18px;
    border-radius: 999px;
    margin-bottom: 22px;
  }
  a.email {
    color: var(--cream);
    font-weight: 600;
    text-decoration: underline;
  }
</style>
</head>
<body>
  <div class="wrap">
    <img src="images/logo.svg" alt="The Harley Co. logo" class="badge">
    <span class="pill">Coming Soon</span>
    <h1>We're Baking Something New</h1>
    <p>
      The Harley Co. website is under construction. We're putting the finishing
      touches on it &mdash; check back soon for our weekly menu and ordering.
    </p>
    <p>
      Questions in the meantime? <a class="email" href="mailto:colekouremetis2@gmail.com">colekouremetis2@gmail.com</a>
    </p>
  </div>
</body>
</html>
